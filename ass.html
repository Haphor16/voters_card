    <div class="container">
        <h2>Voter's Card Registration Form</h2>
        <form action="" id="voterCardRegistration">
            <div class="form-group">
                <label for="firstName">First Name *</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name *</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>

            <div class="form-group">
                <label for="otherName">Other Name</label>
                <input type="text" id="otherName" name="otherName">
            </div>

            <div class="form-group">
                <label for="state">State of Origin *</label>
                <select id="state" name="state" required>
                    <option value="">-- Select State --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="lga">LGA *</label>
                <select id="lga" name="lga" required disabled>
                    <option value="">-- Select State First --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pollingUnit">Polling Unit *</label>
                <select id="pollingUnit" name="pollingUnit" required disabled>
                    <option value="">-- Select LGA First --</option>
                </select>
            </div>

            <button type="submit">Register</button>
        </form>
    </div>

        const lgaPollingUnits = {
            "Aba North": ["Eziama Ward PU 01", "Industrial Ward PU 02", "Osusu Ward PU 03"],
            "Aba South": ["Aba River PU 01", "Ekeoha PU 02", "Ohazu Ward PU 03"],
            "Alimosho": ["Ikotun/Ijegun PU 01", "Egbeda/Alimosho PU 02", "Iyana Ipaja PU 03", "Onyigbo Ward PU 04"],

        };

        const lgaSelect = document.getElementById('lga');
        const pollingUnitSelect = document.getElementById('pollingUnit');

        // Populate states dropdown
        Object.keys(nigeriaStatesLGA).sort().forEach(state => {
            const option = document.createElement('option');
            option.value = state;
            option.textContent = state;
            stateSelect.appendChild(option);
        });

        // Update LGAs when state changes
        stateSelect.addEventListener('change', function() {
            const selectedState = this.value;
            lgaSelect.innerHTML = '<option value="">-- Select LGA --</option>';
            pollingUnitSelect.innerHTML = '<option value="">-- Select LGA First --</option>';
            pollingUnitSelect.disabled = true;
            
            if (selectedState) {
                lgaSelect.disabled = false;
                const lgas = nigeriaStatesLGA[selectedState];
                lgas.forEach(lga => {
                    const option = document.createElement('option');
                    option.value = lga;
                    option.textContent = lga;
                    lgaSelect.appendChild(option);
                });
            } else {
                lgaSelect.disabled = true;
                lgaSelect.innerHTML = '<option value="">-- Select State First --</option>';
            }
        });

        // Update Polling Units when LGA changes
        lgaSelect.addEventListener('change', function() {
            const selectedLGA = this.value;
            pollingUnitSelect.innerHTML = '<option value="">-- Select Polling Unit --</option>';
            
            if (selectedLGA) {
                pollingUnitSelect.disabled = false;
                
                // Get units from map, or generate placeholders dynamically if the chosen LGA isn't specifically mapped above
                const units = lgaPollingUnits[selectedLGA] || [
                    `${selectedLGA} Ward 1 - PU 001`, 
                    `${selectedLGA} Ward 2 - PU 002`, 
                    `${selectedLGA} Ward 3 - PU 003`
                ];
                
                units.forEach(unit => {
                    const option = document.createElement('option');
                    option.value = unit;
                    option.textContent = unit;
                    pollingUnitSelect.appendChild(option);
                });
            } else {
                pollingUnitSelect.disabled = true;
                pollingUnitSelect.innerHTML = '<option value="">-- Select LGA First --</option>';
            }
        });
